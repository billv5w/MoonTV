name: Sync with Upstream

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/senshinya/MoonTV.git
          git fetch upstream

      - name: Check for updates
        id: check
        run: |
          # Check if there are new commits in upstream
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/main)
          if [ $LOCAL != $REMOTE ]; then
            echo "updates=true" >> $GITHUB_OUTPUT
          else
            echo "updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync with upstream
        if: steps.check.outputs.updates == 'true'
        run: |
          # Stash our custom docker-compose.yml if it exists
          if [ -f docker-compose.yml ]; then
            cp docker-compose.yml docker-compose.yml.backup
          fi
          
          # Merge upstream changes
          git merge upstream/main --no-edit || {
            echo "Merge conflict detected. Manual intervention required."
            exit 1
          }
          
          # Restore our custom docker-compose.yml
          if [ -f docker-compose.yml.backup ]; then
            mv docker-compose.yml.backup docker-compose.yml
            git add docker-compose.yml
            git commit -m "Restore custom docker-compose.yml after upstream sync" || true
          fi

      - name: Push changes
        if: steps.check.outputs.updates == 'true'
        run: |
          git push origin main
